name: Pipeline

env:
   NODE_VERSION: '24.15.0'
   PACKAGE_MANAGER: 'pnpm'
   PACKAGE_MANAGER_VERSION: '10.15.0'

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

permissions:
   actions: write
   contents: read
   pages: write
   id-token: write

jobs:
   lint-and-test:
      name: Lint and test
      runs-on: ubuntu-latest
      steps:
         - name: checkout
           uses: actions/checkout@v5
         - name: install node
           uses: actions/setup-node@v5
           with:
              node-version: ${{ env.NODE_VERSION }}
         - name: install pnpm (package manager)
           uses: pnpm/action-setup@v5
           with:
              version: ${{ env.PACKAGE_MANAGER_VERSION }}
         - name: Test and audit
           run: |
              pnpm install
              pnpm lint
              pnpm test
         - name: Write RPG character export sample (CI fixture)
           run: pnpm run rpg:write-export-sample
         - name: Upload RPG character export sample
           uses: actions/upload-artifact@v5
           with:
              name: rpg-character-export-sample
              path: artifacts/rpg-character-export.sample.json

   build-audit-package:
      name: Build, audit and package
      needs: lint-and-test
      runs-on: ubuntu-latest
      steps:
         - name: checkout
           uses: actions/checkout@v5
         - name: install node
           uses: actions/setup-node@v5
           with:
              node-version: '24.15.0'
         - name: install pnpm (package manager)
           uses: pnpm/action-setup@v5
           with:
              version: 10.15.0
         - name: Build and audit
           run: |
              pnpm install
              pnpm run build
              pnpm audit
         - name: Package dist for GitHub Pages
           if: github.ref == 'refs/heads/main' && github.event_name == 'push'
           uses: actions/upload-pages-artifact@v5
           with:
              path: dist

   deploy-pages:
      name: Deploy GitHub Pages
      needs: build-audit-package
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
      steps:
         - name: Publicar site (artifact -> Pages)
           id: deployment
           uses: actions/deploy-pages@v5
