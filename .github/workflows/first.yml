name: build and deploy

env:
   NODE_VERSION: '24.15.0'
   PACKAGE_MANAGER: 'pnpm'

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   job1:
      name: Ubuntu job
      runs-on: ubuntu-latest
      steps:
         - name: checkout
           uses: actions/checkout@v4
         - name: install node
           uses: actions/setup-node@v4
           with:
              node-version: '24.15.0'
         - name: environment variables
           run: 'env | sort'
         - name: install dependencies and audit
           run: |
              pnpm install
              pnpm run build
              pnpm audit
   job2:
      name: Windows job
      runs-on: windows-latest
      steps:
         - name: checkout
           uses: actions/checkout@v4
         - name: install node
           uses: actions/setup-node@v4
           with:
              node-version: '24.15.0'
         - name: install pnpm
           uses: pnpm/action-setup@v4
           with:
              version: latest
         - name: environment variables
           run: 'Get-ChildItem Env: | Sort-Object Name'
         - name: install dependencies and audit
           run: |
              pnpm install
              pnpm run build
              pnpm audit
   job3:
      name: MacOS job
      runs-on: macos-latest
      steps:
         - name: checkout
           uses: actions/checkout@v4
         - name: install node
           uses: actions/setup-node@v4
           with:
              node-version: '24.15.0'
         - name: environment variables
           run: 'env | sort'
         - name: install dependencies and audit
           run: |
              pnpm install
              pnpm run build
              pnpm audit
