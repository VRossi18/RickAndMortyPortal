name: first

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   job1:
      name: first job
      runs-on: ubuntu-latest
      steps:
         - name: checkout
           uses: actions/checkout@v4
   job2:
      name: second job
      needs: job1
      runs-on: ubuntu-latest
      steps:
         - name: environment variables
           run: 'env | sort'
         - name: install node
           uses: actions/setup-node@v4
         - name: install dependencies and audit
           run: |
              npm install
              npm run build
