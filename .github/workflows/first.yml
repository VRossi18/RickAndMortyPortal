name: build and deploy

env:
   NODE_VERSION: '24.15.0'
   PACKAGE_MANAGER: 'pnpm'

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   job1:
      name: Build and test job
      runs-on: ubuntu-latest
      steps:
         - name: checkout
           uses: actions/checkout@v4
         - name: install node
           uses: actions/setup-node@v4
           with:
              node-version: '24.15.0'
         - name: install pnpm (package manager)
           uses: pnpm/action-setup@v4
           with:
              # pnpm 11+ não lê mais `pnpm.onlyBuiltDependencies` em package.json (só pnpm-workspace.yaml).
              # Fixar 10.x mantém o allowlist do esbuild e evita ERR_PNPM_IGNORED_BUILDS no CI.
              version: 10.15.0
         - name: environment variables
           run: 'env | sort'
         - name: install dependencies, test, build and audit
           run: |
              pnpm install
              pnpm run test
              pnpm run build
              pnpm audit
